name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Ruff lint
        run: |
          pip install ruff==0.15.14
          cd backend && ruff check app/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci --prefer-offline

      - name: ESLint
        run: cd frontend && npm run lint

  # ── 2. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: ragdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag -d ragdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://rag:rag@localhost:5432/ragdb
      SYNC_DATABASE_URL: postgresql://rag:rag@localhost:5432/ragdb
      REDIS_URL: redis://localhost:6379/0
      OPENROUTER_API_KEY: dummy-for-tests
      SECRET_KEY: ci-test-secret-key-not-used-in-prod

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get install -y --no-install-recommends postgresql-client
          pip install -r backend/requirements.txt

      - name: Apply migrations
        run: |
          psql postgresql://rag:rag@localhost:5432/ragdb \
            -f backend/migrations/001_initial.sql
          psql postgresql://rag:rag@localhost:5432/ragdb \
            -f backend/migrations/002_users.sql

      - name: Run tests
        run: cd backend && pytest tests/ -v --tb=short

  # ── 3. Build Docker ──────────────────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build postgres image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./postgres.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
